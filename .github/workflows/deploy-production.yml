name: Deploy to Production

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy-core:
    runs-on: ubuntu-latest
    name: Deploy Core to Production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
        working-directory: workers/backend/api
      - name: Run tests
        run: npx vitest run
        working-directory: workers/backend/api
      - name: Deploy callibrate-core (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --env production
          workingDirectory: workers/backend/api

  deploy-satellite:
    runs-on: ubuntu-latest
    name: Deploy Satellite to Production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
        working-directory: workers/frontend/satellites
      - name: Run tests
        run: npx vitest run
        working-directory: workers/frontend/satellites
      - name: Deploy callibrate-satellite (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --env production
          workingDirectory: workers/frontend/satellites

  deploy-posthog-proxy:
    runs-on: ubuntu-latest
    name: Deploy PostHog Proxy to Production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
        working-directory: workers/backend/posthog-proxy
      - name: Run tests
        run: npx vitest run
        working-directory: workers/backend/posthog-proxy
      - name: Deploy callibrate-posthog-proxy (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --env production
          workingDirectory: workers/backend/posthog-proxy
