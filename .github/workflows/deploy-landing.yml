name: Deploy Landing

on:
  push:
    branches:
      - staging
      - production
    paths:
      - "workers/frontend/landing/**"

jobs:
  deploy-staging:
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    name: Deploy Landing to Staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
        working-directory: workers/frontend/landing
      - name: Run tests
        run: npx vitest run
        working-directory: workers/frontend/landing
      - name: Deploy callibrate-landing (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --env staging
          workingDirectory: workers/frontend/landing

  deploy-production:
    if: github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest
    name: Deploy Landing to Production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
        working-directory: workers/frontend/landing
      - name: Run tests
        run: npx vitest run
        working-directory: workers/frontend/landing
      - name: Deploy callibrate-landing (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --env production
          workingDirectory: workers/frontend/landing
