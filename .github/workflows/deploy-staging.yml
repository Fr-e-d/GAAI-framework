name: Deploy to Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy-core:
    runs-on: ubuntu-latest
    name: Deploy Core to Staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
        working-directory: workers/backend/api
      - name: Run tests
        run: npx vitest run
        working-directory: workers/backend/api
      - name: Deploy callibrate-core (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --env staging
          workingDirectory: workers/backend/api

  deploy-satellite:
    runs-on: ubuntu-latest
    name: Deploy Satellite to Staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
        working-directory: workers/frontend/satellites
      - name: Run tests
        run: npx vitest run
        working-directory: workers/frontend/satellites
      - name: Deploy callibrate-satellite (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --env staging
          workingDirectory: workers/frontend/satellites

  deploy-posthog-proxy:
    runs-on: ubuntu-latest
    name: Deploy PostHog Proxy to Staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
        working-directory: workers/backend/posthog-proxy
      - name: Run tests
        run: npx vitest run
        working-directory: workers/backend/posthog-proxy
      - name: Deploy callibrate-posthog-proxy (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --env staging
          workingDirectory: workers/backend/posthog-proxy
