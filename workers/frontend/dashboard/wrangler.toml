name = "callibrate-dashboard-dev"
main = "./workers/app.ts"
compatibility_date = "2026-02-27"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./build/client"

# ── Dev (local) env vars ─────────────────────────────────────────────────────
# Secrets: load from .dev.vars (gitignored)

[vars]
CORE_API_URL = "http://localhost:8787"
SUPABASE_URL = "https://PLACEHOLDER.supabase.co"
SUPABASE_ANON_KEY = "PLACEHOLDER"

# ── Staging ──────────────────────────────────────────────────────────────────

[env.staging]
name = "callibrate-dashboard-staging"

[env.staging.vars]
CORE_API_URL = "https://callibrate-core-staging.frederic-geens-consulting.workers.dev"
SUPABASE_URL = "https://PLACEHOLDER.supabase.co"
SUPABASE_ANON_KEY = "PLACEHOLDER_STAGING_ANON_KEY"

# ── Production ───────────────────────────────────────────────────────────────

[env.production]
name = "callibrate-dashboard-prod"

[env.production.vars]
CORE_API_URL = "https://api.callibrate.io"
SUPABASE_URL = "https://PLACEHOLDER.supabase.co"
SUPABASE_ANON_KEY = "PLACEHOLDER_PROD_ANON_KEY"

# ── Secrets (set via wrangler secret put per env) ────────────────────────────
# SUPABASE_URL       — actual Supabase project URL
# SUPABASE_ANON_KEY  — actual Supabase anon key
# SESSION_SECRET     — for cookie signing (future use)
