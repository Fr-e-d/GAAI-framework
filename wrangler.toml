name = "callibrate-core"
main = "src/index.ts"
compatibility_date = "2024-10-22"
compatibility_flags = ["nodejs_compat"]

# ── Default (dev) environment ────────────────────────────────────────────────

[[queues.consumers]]
queue = "email-notifications"
max_batch_size = 10
max_batch_timeout = 5

[[queues.consumers]]
queue = "lead-billing"
max_batch_size = 10
max_batch_timeout = 5

[[queues.consumers]]
queue = "matching-jobs"
max_batch_size = 10
max_batch_timeout = 5

[[queues.producers]]
queue = "email-notifications"
binding = "EMAIL_NOTIFICATIONS"

[[queues.producers]]
queue = "lead-billing"
binding = "LEAD_BILLING"

[[queues.producers]]
queue = "matching-jobs"
binding = "MATCHING_JOBS"

[[kv_namespaces]]
binding = "SESSIONS"
id = "PLACEHOLDER_SESSIONS_KV_ID"
preview_id = "PLACEHOLDER_SESSIONS_KV_PREVIEW_ID"

[[kv_namespaces]]
binding = "RATE_LIMITING"
id = "PLACEHOLDER_RATE_LIMITING_KV_ID"
preview_id = "PLACEHOLDER_RATE_LIMITING_KV_PREVIEW_ID"

[[kv_namespaces]]
binding = "FEATURE_FLAGS"
id = "PLACEHOLDER_FEATURE_FLAGS_KV_ID"
preview_id = "PLACEHOLDER_FEATURE_FLAGS_KV_PREVIEW_ID"

# ── Staging environment ───────────────────────────────────────────────────────

[env.staging]
name = "callibrate-core-staging"

[[env.staging.queues.consumers]]
queue = "email-notifications-staging"
max_batch_size = 10
max_batch_timeout = 5

[[env.staging.queues.consumers]]
queue = "lead-billing-staging"
max_batch_size = 10
max_batch_timeout = 5

[[env.staging.queues.consumers]]
queue = "matching-jobs-staging"
max_batch_size = 10
max_batch_timeout = 5

[[env.staging.queues.producers]]
queue = "email-notifications-staging"
binding = "EMAIL_NOTIFICATIONS"

[[env.staging.queues.producers]]
queue = "lead-billing-staging"
binding = "LEAD_BILLING"

[[env.staging.queues.producers]]
queue = "matching-jobs-staging"
binding = "MATCHING_JOBS"

[[env.staging.kv_namespaces]]
binding = "SESSIONS"
id = "PLACEHOLDER_SESSIONS_KV_STAGING_ID"

[[env.staging.kv_namespaces]]
binding = "RATE_LIMITING"
id = "PLACEHOLDER_RATE_LIMITING_KV_STAGING_ID"

[[env.staging.kv_namespaces]]
binding = "FEATURE_FLAGS"
id = "PLACEHOLDER_FEATURE_FLAGS_KV_STAGING_ID"

# ── Production environment ────────────────────────────────────────────────────

[env.production]
name = "callibrate-core-prod"

[[env.production.queues.consumers]]
queue = "email-notifications"
max_batch_size = 10
max_batch_timeout = 5

[[env.production.queues.consumers]]
queue = "lead-billing"
max_batch_size = 10
max_batch_timeout = 5

[[env.production.queues.consumers]]
queue = "matching-jobs"
max_batch_size = 10
max_batch_timeout = 5

[[env.production.queues.producers]]
queue = "email-notifications"
binding = "EMAIL_NOTIFICATIONS"

[[env.production.queues.producers]]
queue = "lead-billing"
binding = "LEAD_BILLING"

[[env.production.queues.producers]]
queue = "matching-jobs"
binding = "MATCHING_JOBS"

[[env.production.kv_namespaces]]
binding = "SESSIONS"
id = "PLACEHOLDER_SESSIONS_KV_PROD_ID"

[[env.production.kv_namespaces]]
binding = "RATE_LIMITING"
id = "PLACEHOLDER_RATE_LIMITING_KV_PROD_ID"

[[env.production.kv_namespaces]]
binding = "FEATURE_FLAGS"
id = "PLACEHOLDER_FEATURE_FLAGS_KV_PROD_ID"
